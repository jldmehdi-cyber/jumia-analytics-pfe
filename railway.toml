[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn jumia_analytics.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level debug --preload"
healthcheckPath = "/api/health/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
