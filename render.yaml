services:
  - type: web
    name: jumia-analytics-pfe
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python reset_admin.py && gunicorn jumia_analytics.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: NEON_DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
